services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "python manage.py migrate && python manage.py runserver 0:8000"
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - .:/opt/project
    environment:
      - DJANGO_DEBUG=true
      - DJANGO_ENVIRONMENT=dev
      - DJANGO_SETTINGS_MODULE=project.settings

  ui-test:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - /bin/sh
      - -c
      - |
          set -eu
          python - <<'PY'
          import os
          import pathlib
          import subprocess
          import sys
          import time
          import urllib.request

          project_root = pathlib.Path("/opt/project")
          artifact_root = project_root / "test-results"
          screenshot_dir = artifact_root / "playwright"
          server_log = artifact_root / "django-ui-server.log"
          database_path = project_root / "db.sqlite3"
          env = os.environ.copy()

          screenshot_dir.mkdir(parents=True, exist_ok=True)
          for screenshot in screenshot_dir.glob("*.png"):
              screenshot.unlink()
          if server_log.exists():
              server_log.unlink()
          if database_path.exists():
              database_path.unlink()

          subprocess.run(["python", "manage.py", "migrate", "--noinput"], check=True, cwd=project_root, env=env)
          subprocess.run(
              [
                  "python",
                  "manage.py",
                  "seed_demo_data",
                  "--username",
                  env.get("E2E_USERNAME", "ui-user"),
                  "--password",
                  env.get("E2E_PASSWORD", "top_secret"),
              ],
              check=True,
              cwd=project_root,
              env=env,
          )

          result_code = 1
          with server_log.open("w", encoding="utf-8") as log_handle:
              server = subprocess.Popen(
                  ["python", "manage.py", "runserver", "0.0.0.0:8000"],
                  cwd=project_root,
                  env=env,
                  stdout=log_handle,
                  stderr=subprocess.STDOUT,
              )
              try:
                  target = f"{env.get('E2E_BASE_URL', 'http://127.0.0.1:8000')}/accounts/login/"
                  for _ in range(60):
                      try:
                          with urllib.request.urlopen(target, timeout=2) as response:
                              if response.status < 500:
                                  break
                      except Exception:
                          time.sleep(1)
                  else:
                      raise SystemExit(f"Timed out waiting for {target}")

                  result = subprocess.run(
                      ["python", "-m", "pytest", "-m", "ui", "app/tests/test_browser_ui.py", "-v"],
                      cwd=project_root,
                      env=env,
                      check=False,
                  )
                  result_code = result.returncode
              finally:
                  server.terminate()
                  try:
                      server.wait(timeout=10)
                  except subprocess.TimeoutExpired:
                      server.kill()
                      server.wait(timeout=10)

          sys.exit(result_code)
          PY
    volumes:
      - .:/opt/project
    environment:
      - DJANGO_DEBUG=true
      - DJANGO_ENVIRONMENT=dev
      - DJANGO_SETTINGS_MODULE=project.settings
      - E2E_BASE_URL=http://127.0.0.1:8000
      - PLAYWRIGHT_SCREENSHOT_DIR=/opt/project/test-results/playwright